<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Outcomes Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast" class="toast hidden"></div>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Status</div>
                <label class="filter-label">
                    <input type="checkbox" id="filter-available" checked>
                    <span class="badge available">Available</span>
                    <span class="count" id="count-available">0</span>
                </label>
                <label class="filter-label">
                    <input type="checkbox" id="filter-taken" checked>
                    <span class="badge taken">Taken</span>
                    <span class="count" id="count-taken">0</span>
                </label>
                <label class="filter-label">
                    <input type="checkbox" id="filter-unclear" checked>
                    <span class="badge unclear">Unclear</span>
                    <span class="count" id="count-unclear">0</span>
                </label>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Jump to Letter</div>
                <div class="alphabet-grid" id="alphabet-grid">
                    <!-- Generated by JS -->
                </div>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main">
            <header>
                <h1>Word Outcomes Database</h1>
                <p class="subtitle">
                    Last updated: <span id="last-updated">Never</span>
                    &nbsp;·&nbsp;
                    <span id="total-count">0</span> total records
                </p>
            </header>

            <div class="search-bar-wrap">
                <input type="text" id="search-input" placeholder="Type to filter by prefix… (e.g. 'ba' shows names starting with 'ba')">
                <button id="clear-search" class="clear-btn" title="Clear search">✕</button>
            </div>

            <div id="active-filter-banner" class="filter-banner hidden"></div>

            <table id="results-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <tr><td colspan="2" class="msg">Loading data…</td></tr>
                </tbody>
            </table>

            <div id="load-more-wrap" class="load-more-wrap hidden">
                <span id="showing-info" class="showing-info"></span>
                <button id="load-more-btn">Load more</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
